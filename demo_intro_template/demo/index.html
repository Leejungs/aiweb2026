<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🤖 AI 면접관 — Live Demo</title>
  <meta name="description" content="랜덤 출제 · 실시간 피드백 · 5단계 모의 면접 시뮬레이션" />
  <link rel="stylesheet" href="demo.css" />
</head>
<body>

  <header class="demo-header">
    <div class="demo-header-inner">
      <a class="back-link" href="../index.html">← 인트로로</a>
      <h1>🤖 AI 면접관</h1>
      <span class="demo-badge">Interactive Demo</span>
    </div>
  </header>

  <main class="story-wrap">

    <!-- 시작: 설정 -->
    <section class="screen screen-start" id="screenStart">
      <div class="stats-row">
        <div class="stat-chip"><span id="statSessions">0</span><small>면접 완료</small></div>
        <div class="stat-chip"><span id="statBest">—</span><small>최고 점수</small></div>
        <div class="stat-chip"><span id="statStreak">—</span><small>80점+ 연속</small></div>
      </div>

      <div class="setup-grid">
        <label class="field">
          <span>지원 직무</span>
          <select id="jobSelect"></select>
        </label>
        <label class="field">
          <span>면접관 선택</span>
          <select id="interviewerSelect"></select>
        </label>
        <label class="field">
          <span>면접 모드</span>
          <select id="modeSelect"></select>
        </label>
      </div>
      <p class="mode-desc" id="modeDesc"></p>

      <div class="character-card" id="previewCard">
        <div class="character-avatar" id="previewAvatar">👩‍💼</div>
        <div class="character-info">
          <h2 id="previewName">김하린</h2>
          <p class="character-role" id="previewRole">인사팀 면접관</p>
          <p class="character-desc" id="previewGreeting"></p>
        </div>
      </div>

      <div class="feature-list">
        <span>🎲 매번 다른 질문</span>
        <span>⚡ 실시간 피드백</span>
        <span>📊 역량 리포트</span>
        <span>🏅 업적 시스템</span>
      </div>

      <button class="btn-start" id="btnStart" type="button">▶ 면접 시작하기</button>
    </section>

    <!-- 진행 -->
    <section class="screen screen-play" id="screenPlay" hidden>

      <div class="hud">
        <div class="hud-char">
          <span id="hudAvatar">👩‍💼</span>
          <span id="hudName">김하린</span>
          <span id="hudMood">😊</span>
        </div>
        <div class="hud-meters">
          <div class="meter">
            <label>자신감 <b id="hudConfidenceVal">70</b></label>
            <div class="meter-track"><div class="meter-fill conf" id="hudConfidence"></div></div>
          </div>
          <div class="meter">
            <label>면접관 호감 <b id="hudRapportVal">70</b></label>
            <div class="meter-track"><div class="meter-fill rapport" id="hudRapport"></div></div>
          </div>
        </div>
        <div class="hud-actions">
          <div class="timer-box" id="timerBox" hidden>⏱ <span id="timerText">50</span>s</div>
          <button class="btn-hint" id="btnHint" type="button">💡 힌트 (<span id="hintCount">2</span>)</button>
        </div>
      </div>

      <p class="hint-toast" id="hintToast" hidden></p>

      <div class="step-bar" id="stepBar"></div>
      <div class="step-header">
        <span class="step-label" id="stepLabel">1 / 5</span>
        <span class="question-tag" id="questionTag">인성</span>
      </div>

      <div class="story-panel">
        <p class="story-scene" id="storyScene"></p>
        <p class="story-narration" id="storyNarration"></p>
        <div class="story-dialogue" id="storyDialogue"></div>
      </div>

      <div class="choice-panel" id="choicePanel">
        <p class="choice-title">답변을 선택하세요 (A · B · C)</p>
        <div class="choices" id="choices"></div>
      </div>

      <div class="feedback-panel" id="feedbackPanel" hidden>
        <div class="feedback-top">
          <span class="reaction" id="reactionEmoji">😊</span>
          <span class="feedback-header" id="feedbackHeader"></span>
        </div>
        <p class="feedback-text" id="feedbackText"></p>
        <div class="ideal-box" id="idealBox" hidden>
          <strong>📌 모범 답변 예시</strong>
          <p id="idealText"></p>
        </div>
        <button class="btn-next" id="btnNext" type="button">다음 질문 →</button>
      </div>
    </section>

    <!-- 결과 -->
    <section class="screen screen-end" id="screenEnd" hidden>
      <div class="character-card compact">
        <div class="character-avatar" id="endAvatar">👩‍💼</div>
        <div class="character-info">
          <h2>면접 종료</h2>
          <p class="character-desc" id="endDialogue"></p>
        </div>
      </div>

      <div class="result-score" id="resultScore"></div>

      <div class="result-section">
        <h3>📈 역량 분석</h3>
        <div class="skill-radar" id="skillRadar"></div>
      </div>

      <div class="result-section">
        <h3>🏅 획득 업적</h3>
        <div class="achievements" id="achievements"></div>
      </div>

      <div class="result-section">
        <h3>💡 문항별 피드백</h3>
        <div class="result-log" id="resultLog"></div>
      </div>

      <button class="btn-restart" id="btnRestart" type="button">🔄 다른 직무로 다시 도전</button>
    </section>

  </main>

  <script src="questions.js"></script>
  <script src="demo.js"></script>
</body>
</html>
